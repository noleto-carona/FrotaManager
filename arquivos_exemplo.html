<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Fleet Manager | Ordens de Serviço</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f4f7fc;
            padding: 16px 12px 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        /* Header */
        .app-header {
            margin-bottom: 20px;
        }
        .app-header h1 {
            font-size: 1.6rem;
            color: #0f3b4c;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .badge {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: normal;
        }
        /* Abas (tabs) estilo mobile */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            background: white;
            border-radius: 60px;
            padding: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .tab-btn {
            flex: 1;
            background: #f1f5f9;
            border: none;
            padding: 10px 4px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #1e293b;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .tab-btn i { font-size: 0.9rem; }
        .tab-btn.active {
            background: #2c7da0;
            color: white;
            box-shadow: 0 2px 6px rgba(44,125,160,0.3);
        }
        .tab-pane {
            display: none;
            background: white;
            border-radius: 28px;
            padding: 20px 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .tab-pane.active-pane {
            display: block;
        }
        /* Formulários e cards */
        .form-group {
            margin-bottom: 16px;
        }
        label {
            font-weight: 600;
            font-size: 0.75rem;
            color: #334155;
            display: block;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.9rem;
            background: #fff;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button i { font-size: 0.85rem; }
        .btn-outline {
            background: white;
            border: 1px solid #2c7da0;
            color: #2c7da0;
        }
        .btn-danger {
            background: #dc2626;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.7rem;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .list-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .item-title {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .item-desc {
            font-size: 0.75rem;
            color: #475569;
        }
        .badge-status {
            background: #e2e8f0;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
        }
        hr {
            margin: 16px 0;
        }
        .servico-item {
            background: #ffffff;
            border-left: 4px solid #2c7da0;
            padding: 10px;
            margin: 8px 0;
            border-radius: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .empty-msg {
            text-align: center;
            padding: 24px;
            color: #64748b;
            font-size: 0.8rem;
        }
        .whatsapp-btn {
            background: #25D366;
        }
        @media (max-width: 550px) {
            .tab-btn span { display: none; }
            .tab-btn i { margin: 0; }
            .tab-btn { padding: 10px 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <h1><i class="fas fa-truck-fast"></i> Frota Manager <span class="badge">localStorage</span></h1>
        <p style="font-size:0.75rem; margin-top:6px;">Ordens com múltiplas placas e serviços por placa</p>
    </div>

    <!-- Abas -->
    <div class="tabs">
        <button class="tab-btn" data-tab="motoristas"><i class="fas fa-user"></i><span> Motoristas</span></button>
        <button class="tab-btn" data-tab="gestores"><i class="fas fa-user-tie"></i><span> Gestores</span></button>
        <button class="tab-btn" data-tab="encarregados"><i class="fas fa-hard-hat"></i><span> Encarregados</span></button>
        <button class="tab-btn" data-tab="placas"><i class="fas fa-car"></i><span> Placas</span></button>
        <button class="tab-btn" data-tab="status"><i class="fas fa-tag"></i><span> Status</span></button>
        <button class="tab-btn active" data-tab="ordens"><i class="fas fa-clipboard-list"></i><span> Ordens</span></button>
    </div>

    <!-- Painel Motoristas -->
    <div id="motoristas" class="tab-pane">
        <h3><i class="fas fa-user-plus"></i> Cadastrar Motorista</h3>
        <div class="flex-row" style="margin-bottom: 12px;">
            <input type="text" id="novoMotorista" placeholder="Nome do motorista" style="flex:1;">
            <button id="addMotoristaBtn"><i class="fas fa-save"></i> Salvar</button>
        </div>
        <div id="listaMotoristas"></div>
    </div>

    <!-- Painel Gestores -->
    <div id="gestores" class="tab-pane">
        <h3><i class="fas fa-user-tie"></i> Gestor de Frota</h3>
        <div class="flex-row" style="margin-bottom: 12px;">
            <input type="text" id="novoGestor" placeholder="Nome do gestor" style="flex:1;">
            <button id="addGestorBtn"><i class="fas fa-save"></i> Salvar</button>
        </div>
        <div id="listaGestores"></div>
    </div>

    <!-- Painel Encarregados -->
    <div id="encarregados" class="tab-pane">
        <h3><i class="fas fa-hard-hat"></i> Encarregado Manutenção</h3>
        <div class="flex-row" style="margin-bottom: 12px;">
            <input type="text" id="novoEncarregado" placeholder="Nome" style="flex:1;">
            <button id="addEncarregadoBtn"><i class="fas fa-save"></i> Salvar</button>
        </div>
        <div id="listaEncarregados"></div>
    </div>

    <!-- Painel Placas (cadastro base) -->
    <div id="placas" class="tab-pane">
        <h3><i class="fas fa-id-card"></i> Cadastro de Placas/Veículos</h3>
        <div class="form-group"><label>Tipo (CV / CR / TRUCK)</label><input type="text" id="placaTipo" placeholder="Ex: CV"></div>
        <div class="form-group"><label>Número da Placa</label><input type="text" id="placaNumero" placeholder="AXR6527"></div>
        <div class="form-group"><label>Modelo / Observação</label><input type="text" id="placaModelo" placeholder="Scania R450"></div>
        <button id="addPlacaBtn"><i class="fas fa-plus"></i> Adicionar Placa</button>
        <hr>
        <div id="listaPlacasBase"></div>
    </div>

    <!-- Painel Status (para serviços) -->
    <div id="status" class="tab-pane">
        <h3><i class="fas fa-tags"></i> Status dos Serviços</h3>
        <div class="flex-row" style="margin-bottom: 12px;">
            <input type="text" id="novoStatus" placeholder="Ex: Pendente, Finalizado, Em andamento" style="flex:1;">
            <button id="addStatusBtn"><i class="fas fa-plus"></i> Adicionar</button>
        </div>
        <div id="listaStatus"></div>
    </div>

    <!-- Painel Ordens de Serviço (principal) -->
    <div id="ordens" class="tab-pane active-pane">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 16px;">
            <h3><i class="fas fa-clipboard-list"></i> Ordens de Serviço</h3>
            <button id="novaOrdemBtn" class="btn-sm"><i class="fas fa-plus"></i> Nova Ordem</button>
        </div>
        <div id="listaOrdens"></div>
    </div>
</div>

<!-- MODAL para criar/editar ordem (com múltiplas placas e serviços) -->
<div id="ordemModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000; overflow-y:auto; padding:20px;">
    <div style="max-width:700px; margin:20px auto; background:white; border-radius:36px; padding:24px;">
        <h3 id="modalTitle">Nova Ordem de Serviço</h3>
        <input type="hidden" id="ordemEditId" value="">
        <!-- Dados básicos -->
        <div class="form-group"><label>Motorista</label><select id="ordemMotorista"></select></div>
        <div class="form-group"><label>Gestor</label><select id="ordemGestor"></select></div>
        <div class="form-group"><label>Encarregado Manutenção</label><select id="ordemEncarregado"></select></div>
        <div class="form-group"><label>Destino</label><input type="text" id="ordemDestino" placeholder="MEDIANEIRA"></div>
        <div class="form-group"><label>Situação (vazio/carregado)</label><input type="text" id="ordemSituacao" placeholder="VAZIO"></div>
        <div class="form-group"><label>Previsão chegada</label><input type="text" id="ordemPrevisao" placeholder="09/04/26 16:00"></div>
        
        <h4><i class="fas fa-trailer"></i> Placas e Serviços</h4>
        <div id="ordemPlacasContainer"></div>
        <button type="button" id="addPlacaToOrdemBtn" class="btn-outline btn-sm"><i class="fas fa-plus"></i> Adicionar outra placa</button>
        
        <div class="flex-row" style="margin-top: 24px; justify-content: flex-end;">
            <button id="saveOrdemModalBtn" class="btn-sm"><i class="fas fa-save"></i> Salvar Ordem</button>
            <button id="closeModalBtn" class="btn-outline btn-sm">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // ======================== ESTRUTURAS DE DADOS ========================
    let motoristas = ["Waldiney", "João Silva"];
    let gestores = ["Cris", "Ana Paula"];
    let encarregados = ["Itamar", "Marcos"];
    let placasBase = []; // { id, tipo, numero, modelo }
    let statusList = ["Pendente", "Finalizado", "Em andamento"];
    let ordens = [];      // cada ordem: { id, motorista, gestor, encarregado, destino, situacao, previsao, placas: [ { placaId, tipo, numero, modelo, servicos: [ { id, descricao, status } ] } ] }

    // Carregar / salvar localStorage
    function salvarTudo() {
        localStorage.setItem("fleet_motoristas", JSON.stringify(motoristas));
        localStorage.setItem("fleet_gestores", JSON.stringify(gestores));
        localStorage.setItem("fleet_encarregados", JSON.stringify(encarregados));
        localStorage.setItem("fleet_placasBase", JSON.stringify(placasBase));
        localStorage.setItem("fleet_statusList", JSON.stringify(statusList));
        localStorage.setItem("fleet_ordens", JSON.stringify(ordens));
    }

    function carregarTudo() {
        const m = localStorage.getItem("fleet_motoristas");
        if(m) motoristas = JSON.parse(m);
        const g = localStorage.getItem("fleet_gestores");
        if(g) gestores = JSON.parse(g);
        const e = localStorage.getItem("fleet_encarregados");
        if(e) encarregados = JSON.parse(e);
        const pb = localStorage.getItem("fleet_placasBase");
        if(pb) placasBase = JSON.parse(pb);
        const st = localStorage.getItem("fleet_statusList");
        if(st) statusList = JSON.parse(st);
        const ord = localStorage.getItem("fleet_ordens");
        if(ord) ordens = JSON.parse(ord);
        else initDemoOrdem();
        renderAllTabs();
    }

    function initDemoOrdem() {
        if(ordens.length === 0) {
            // exemplo com duas placas e serviços
            const placaDemo1 = { id: Date.now()+1, tipo:"CV", numero:"AXR6527", modelo:"Carreta A" };
            const placaDemo2 = { id: Date.now()+2, tipo:"CR", numero:"ACW-9559", modelo:"Reboque" };
            placasBase.push(placaDemo1, placaDemo2);
            ordens.push({
                id: Date.now(),
                motorista: "Waldiney",
                gestor: "Cris",
                encarregado: "Itamar",
                destino: "MEDIANEIRA",
                situacao: "VAZIO",
                previsao: "09/04/26 16:00",
                placas: [
                    { 
                        placaId: placaDemo1.id, tipo: placaDemo1.tipo, numero: placaDemo1.numero, modelo: placaDemo1.modelo,
                        servicos: [
                            { id: Date.now()+101, descricao: "ALTO NÍVEL EMISSÃO DE GASES, falha no Arla", status: "Pendente" },
                            { id: Date.now()+102, descricao: "REPARO MAÇANETA PORTA CARONA", status: "Pendente" }
                        ]
                    },
                    {
                        placaId: placaDemo2.id, tipo: placaDemo2.tipo, numero: placaDemo2.numero, modelo: placaDemo2.modelo,
                        servicos: [
                            { id: Date.now()+103, descricao: "TROCAR BORRACHA CAIXA DE COZINHA, entra poeira", status: "Finalizado" }
                        ]
                    }
                ]
            });
        }
    }

    // Renderização geral
    function renderAllTabs() {
        renderMotoristas();
        renderGestores();
        renderEncarregados();
        renderPlacasBase();
        renderStatusList();
        renderOrdens();
    }

    function renderMotoristas() {
        const container = document.getElementById("listaMotoristas");
        if(!container) return;
        if(motoristas.length===0) { container.innerHTML="<div class='empty-msg'>Nenhum motorista</div>"; return; }
        container.innerHTML = motoristas.map((nome, idx) => `
            <div class="list-item">
                <div class="item-header"><span class="item-title">${escapeHtml(nome)}</span>
                <button class="btn-sm btn-danger del-motorista" data-idx="${idx}"><i class="fas fa-trash"></i></button></div>
            </div>
        `).join("");
        document.querySelectorAll(".del-motorista").forEach(btn => {
            btn.addEventListener("click", (e) => { motoristas.splice(parseInt(btn.dataset.idx),1); salvarTudo(); renderAllTabs(); });
        });
    }
    function renderGestores() {
        const container = document.getElementById("listaGestores");
        if(!container) return;
        container.innerHTML = gestores.map((nome,idx)=>`<div class="list-item"><div class="item-header"><span>${escapeHtml(nome)}</span><button class="btn-sm btn-danger del-gestor" data-idx="${idx}"><i class="fas fa-trash"></i></button></div></div>`).join("");
        document.querySelectorAll(".del-gestor").forEach(btn=>btn.addEventListener("click",()=>{gestores.splice(btn.dataset.idx,1);salvarTudo();renderAllTabs();}));
    }
    function renderEncarregados() {
        const container = document.getElementById("listaEncarregados");
        if(!container) return;
        container.innerHTML = encarregados.map((nome,idx)=>`<div class="list-item"><div><span>${escapeHtml(nome)}</span><button class="btn-sm btn-danger del-enc" data-idx="${idx}"><i class="fas fa-trash"></i></button></div></div>`).join("");
        document.querySelectorAll(".del-enc").forEach(btn=>btn.addEventListener("click",()=>{encarregados.splice(btn.dataset.idx,1);salvarTudo();renderAllTabs();}));
    }
    function renderPlacasBase() {
        const container = document.getElementById("listaPlacasBase");
        if(!container) return;
        if(placasBase.length===0){ container.innerHTML="<div class='empty-msg'>Nenhuma placa cadastrada</div>"; return; }
        container.innerHTML = placasBase.map((p,idx)=>`
            <div class="list-item">
                <div><strong>${escapeHtml(p.tipo)} - ${escapeHtml(p.numero)}</strong> ${p.modelo? `(${escapeHtml(p.modelo)})`:''}</div>
                <div class="flex-row" style="justify-content:flex-end;"><button class="btn-sm btn-danger del-placa" data-idx="${idx}"><i class="fas fa-trash"></i> Excluir</button></div>
            </div>
        `).join("");
        document.querySelectorAll(".del-placa").forEach(btn=>btn.addEventListener("click",()=>{placasBase.splice(btn.dataset.idx,1);salvarTudo();renderAllTabs();}));
    }
    function renderStatusList() {
        const container = document.getElementById("listaStatus");
        if(!container) return;
        container.innerHTML = statusList.map((st,idx)=>`
            <div class="list-item"><div class="item-header"><span>${escapeHtml(st)}</span><button class="btn-sm btn-danger del-status" data-idx="${idx}"><i class="fas fa-times"></i></button></div></div>
        `).join("");
        document.querySelectorAll(".del-status").forEach(btn=>btn.addEventListener("click",()=>{statusList.splice(btn.dataset.idx,1);salvarTudo();renderAllTabs();}));
    }

    function renderOrdens() {
        const container = document.getElementById("listaOrdens");
        if(!container) return;
        if(ordens.length===0){ container.innerHTML="<div class='empty-msg'>Nenhuma ordem. Clique em Nova Ordem.</div>"; return; }
        container.innerHTML = ordens.map(order => {
            let placasHtml = "";
            order.placas.forEach(placa => {
                let servicosHtml = placa.servicos.map(srv => `<div class="servico-item"><strong>🔧 ${escapeHtml(srv.descricao)}</strong> <span class="badge-status">${escapeHtml(srv.status)}</span></div>`).join("");
                placasHtml += `<div style="margin-top:10px; border:1px solid #e2e8f0; border-radius:20px; padding:12px;"><strong>${escapeHtml(placa.tipo)} - ${escapeHtml(placa.numero)}</strong> ${placa.modelo?`(${escapeHtml(placa.modelo)})`:''}<div>${servicosHtml || "<em>Sem serviços</em>"}</div></div>`;
            });
            return `<div class="list-item" style="margin-bottom:16px;">
                <div class="item-header"><span class="item-title">🚛 ${escapeHtml(order.motorista)}</span>
                <div><button class="btn-sm btn-outline edit-ordem" data-id="${order.id}"><i class="fas fa-edit"></i></button>
                <button class="btn-sm btn-danger del-ordem" data-id="${order.id}"><i class="fas fa-trash"></i></button>
                <button class="btn-sm whatsapp-btn send-wa" data-id="${order.id}"><i class="fab fa-whatsapp"></i></button></div></div>
                <div class="item-desc">Gestor: ${escapeHtml(order.gestor)} | Encarregado: ${escapeHtml(order.encarregado)} | Destino: ${escapeHtml(order.destino)} | Situação: ${escapeHtml(order.situacao)} | Previsão: ${escapeHtml(order.previsao)}</div>
                <div>${placasHtml}</div>
            </div>`;
        }).join("");
        // eventos
        document.querySelectorAll(".edit-ordem").forEach(btn=>btn.addEventListener("click",()=>abrirModalEditarOrdem(parseInt(btn.dataset.id))));
        document.querySelectorAll(".del-ordem").forEach(btn=>btn.addEventListener("click",()=>{ if(confirm("Excluir ordem?")){ ordens = ordens.filter(o=>o.id!=parseInt(btn.dataset.id)); salvarTudo(); renderOrdens(); } }));
        document.querySelectorAll(".send-wa").forEach(btn=>btn.addEventListener("click",()=>enviarWhatsApp(parseInt(btn.dataset.id))));
    }

    function enviarWhatsApp(orderId){
        const ordem = ordens.find(o=>o.id===orderId);
        if(!ordem) return;
        let msg = `*ORDEM DE SERVIÇO*\nMotorista: ${ordem.motorista}\nGestor: ${ordem.gestor}\nEncarregado: ${ordem.encarregado}\nDestino: ${ordem.destino}\nSituação: ${ordem.situacao}\nPrevisão: ${ordem.previsao}\n\n*SERVIÇOS POR PLACA:*\n`;
        ordem.placas.forEach(p => {
            msg += `\n🔹 ${p.tipo} ${p.numero} (${p.modelo || ''})\n`;
            p.servicos.forEach(s => { msg += `   - ${s.descricao} [${s.status}]\n`; });
        });
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // ---------- MODAL ORDEM (com múltiplas placas e serviços dinâmicos) ----------
    let currentOrdemPlacas = []; // array temporário { placaId, tipo, numero, modelo, servicos:[] }

    function abrirModalNovaOrdem(){
        document.getElementById("modalTitle").innerText = "Nova Ordem de Serviço";
        document.getElementById("ordemEditId").value = "";
        preencherSelects();
        // limpa campos texto
        document.getElementById("ordemDestino").value = "";
        document.getElementById("ordemSituacao").value = "";
        document.getElementById("ordemPrevisao").value = "";
        // inicia placas vazio
        currentOrdemPlacas = [];
        renderOrdemPlacasModal();
        document.getElementById("ordemModal").style.display = "block";
    }

    function abrirModalEditarOrdem(orderId){
        const ordem = ordens.find(o=>o.id===orderId);
        if(!ordem) return;
        document.getElementById("modalTitle").innerText = "Editar Ordem";
        document.getElementById("ordemEditId").value = ordem.id;
        preencherSelects(ordem.motorista, ordem.gestor, ordem.encarregado);
        document.getElementById("ordemDestino").value = ordem.destino;
        document.getElementById("ordemSituacao").value = ordem.situacao;
        document.getElementById("ordemPrevisao").value = ordem.previsao;
        // converter placas da ordem para currentOrdemPlacas (com servicos)
        currentOrdemPlacas = ordem.placas.map(p => ({
            placaId: p.placaId,
            tipo: p.tipo,
            numero: p.numero,
            modelo: p.modelo,
            servicos: p.servicos.map(s => ({ ...s }))
        }));
        renderOrdemPlacasModal();
        document.getElementById("ordemModal").style.display = "block";
    }

    function preencherSelects(motoristaSel="", gestorSel="", encarregadoSel=""){
        const motoristaSelect = document.getElementById("ordemMotorista");
        motoristaSelect.innerHTML = motoristas.map(m => `<option value="${escapeHtml(m)}" ${m===motoristaSel ? "selected" : ""}>${escapeHtml(m)}</option>`).join("");
        const gestorSelect = document.getElementById("ordemGestor");
        gestorSelect.innerHTML = gestores.map(g => `<option value="${escapeHtml(g)}" ${g===gestorSel ? "selected" : ""}>${escapeHtml(g)}</option>`).join("");
        const encSelect = document.getElementById("ordemEncarregado");
        encSelect.innerHTML = encarregados.map(e => `<option value="${escapeHtml(e)}" ${e===encarregadoSel ? "selected" : ""}>${escapeHtml(e)}</option>`).join("");
    }

    function renderOrdemPlacasModal(){
        const container = document.getElementById("ordemPlacasContainer");
        if(!container) return;
        if(currentOrdemPlacas.length===0){
            container.innerHTML = "<div class='empty-msg'>Nenhuma placa adicionada. Clique em 'Adicionar outra placa'</div>";
            return;
        }
        container.innerHTML = "";
        currentOrdemPlacas.forEach((placa, idx) => {
            const divPlaca = document.createElement("div");
            divPlaca.className = "list-item";
            divPlaca.style.marginBottom = "16px";
            divPlaca.innerHTML = `
                <div class="item-header">
                    <strong><i class="fas fa-truck"></i> ${escapeHtml(placa.tipo)} - ${escapeHtml(placa.numero)} ${placa.modelo ? `(${escapeHtml(placa.modelo)})` : ''}</strong>
                    <button class="btn-sm btn-danger remover-placa-ordem" data-idx="${idx}"><i class="fas fa-trash"></i> Remover placa</button>
                </div>
                <div style="margin-top: 8px;"><strong>Serviços desta placa:</strong>
                <div id="servicos-placa-${idx}"></div>
                <button class="btn-sm btn-outline add-servico-placa" data-idx="${idx}" style="margin-top:8px;"><i class="fas fa-plus"></i> Adicionar serviço</button>
                </div>
            `;
            container.appendChild(divPlaca);
            // renderizar serviços
            const servContainer = divPlaca.querySelector(`#servicos-placa-${idx}`);
            if(placa.servicos.length===0){
                servContainer.innerHTML = "<div class='empty-msg' style='padding:8px;'>Nenhum serviço cadastrado</div>";
            } else {
                servContainer.innerHTML = placa.servicos.map((srv, sidx) => `
                    <div class="servico-item" style="display:flex; justify-content:space-between; align-items:center;">
                        <div><strong>${escapeHtml(srv.descricao)}</strong> <span class="badge-status">${escapeHtml(srv.status)}</span></div>
                        <div><button class="btn-sm edit-servico" data-placaidx="${idx}" data-servidx="${sidx}"><i class="fas fa-edit"></i></button>
                        <button class="btn-sm btn-danger del-servico" data-placaidx="${idx}" data-servidx="${sidx}"><i class="fas fa-trash"></i></button></div>
                    </div>
                `).join("");
            }
            // eventos remover placa
            divPlaca.querySelector(".remover-placa-ordem").addEventListener("click", () => { currentOrdemPlacas.splice(idx,1); renderOrdemPlacasModal(); });
            divPlaca.querySelector(".add-servico-placa").addEventListener("click", () => abrirModalServico(idx, null));
            // eventos editar/excluir serviços
            divPlaca.querySelectorAll(".edit-servico").forEach(btn => {
                btn.addEventListener("click", (e) => { const pi=parseInt(btn.dataset.placaidx); const si=parseInt(btn.dataset.servidx); abrirModalServico(pi, si); });
            });
            divPlaca.querySelectorAll(".del-servico").forEach(btn => {
                btn.addEventListener("click", () => { const pi=parseInt(btn.dataset.placaidx); const si=parseInt(btn.dataset.servidx); currentOrdemPlacas[pi].servicos.splice(si,1); renderOrdemPlacasModal(); });
            });
        });
    }

    function abrirModalServico(placaIndex, servicoIndex){
        const placa = currentOrdemPlacas[placaIndex];
        if(!placa) return;
        const isEdit = servicoIndex !== null;
        const descricaoAtual = isEdit ? placa.servicos[servicoIndex].descricao : "";
        const statusAtual = isEdit ? placa.servicos[servicoIndex].status : statusList[0];
        const novoDesc = prompt("Descrição do serviço/reparo:", descricaoAtual);
        if(novoDesc === null || novoDesc.trim() === "") return;
        const novoStatus = prompt(`Status (${statusList.join(", ")}):`, statusAtual);
        if(novoStatus === null) return;
        const statusFinal = statusList.includes(novoStatus) ? novoStatus : statusList[0];
        if(isEdit){
            placa.servicos[servicoIndex] = { id: placa.servicos[servicoIndex].id, descricao: novoDesc.trim(), status: statusFinal };
        } else {
            placa.servicos.push({ id: Date.now()+Math.random(), descricao: novoDesc.trim(), status: statusFinal });
        }
        renderOrdemPlacasModal();
    }

    function adicionarPlacaNaOrdem(){
        if(placasBase.length===0){
            alert("Nenhuma placa cadastrada na aba 'Placas'. Cadastre antes.");
            return;
        }
        // escolher placa da lista
        let opcoes = placasBase.map((p,idx) => `${p.tipo} ${p.numero} (${p.modelo||''})|${idx}`).join(",");
        let escolha = prompt("Escolha a placa:\n" + placasBase.map((p,i)=>`${i+1} - ${p.tipo} ${p.numero}`).join("\n"), "1");
        if(escolha){
            let idxSel = parseInt(escolha)-1;
            if(!isNaN(idxSel) && placasBase[idxSel]){
                const placaSel = placasBase[idxSel];
                if(currentOrdemPlacas.some(p=>p.placaId === placaSel.id)){
                    alert("Esta placa já foi adicionada à ordem!");
                    return;
                }
                currentOrdemPlacas.push({
                    placaId: placaSel.id,
                    tipo: placaSel.tipo,
                    numero: placaSel.numero,
                    modelo: placaSel.modelo,
                    servicos: []
                });
                renderOrdemPlacasModal();
            } else alert("Índice inválido");
        }
    }

    function salvarOrdemModal(){
        const ordemId = document.getElementById("ordemEditId").value;
        const motorista = document.getElementById("ordemMotorista").value;
        const gestor = document.getElementById("ordemGestor").value;
        const encarregado = document.getElementById("ordemEncarregado").value;
        const destino = document.getElementById("ordemDestino").value.trim();
        const situacao = document.getElementById("ordemSituacao").value.trim();
        const previsao = document.getElementById("ordemPrevisao").value.trim();
        if(!motorista || !gestor || !encarregado) { alert("Preencha motorista, gestor e encarregado"); return; }
        if(currentOrdemPlacas.length===0){ alert("Adicione pelo menos uma placa à ordem."); return; }
        // validar se cada placa tem pelo menos um serviço
        let temServico = currentOrdemPlacas.some(p=> p.servicos.length > 0);
        if(!temServico){ alert("Cada ordem deve ter pelo menos uma placa com um serviço. Adicione serviços."); return; }

        const novaOrdem = {
            id: ordemId ? parseInt(ordemId) : Date.now(),
            motorista, gestor, encarregado, destino, situacao, previsao,
            placas: currentOrdemPlacas.map(p => ({
                placaId: p.placaId,
                tipo: p.tipo,
                numero: p.numero,
                modelo: p.modelo,
                servicos: p.servicos.map(s => ({ id: s.id, descricao: s.descricao, status: s.status }))
            }))
        };
        if(ordemId){
            const idx = ordens.findIndex(o=>o.id === novaOrdem.id);
            if(idx!==-1) ordens[idx] = novaOrdem;
        } else {
            ordens.push(novaOrdem);
        }
        salvarTudo();
        renderOrdens();
        fecharModal();
    }

    function fecharModal(){ document.getElementById("ordemModal").style.display = "none"; }

    function escapeHtml(str){ if(!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // Eventos principais
    document.getElementById("addMotoristaBtn").addEventListener("click",()=>{ let n=document.getElementById("novoMotorista").value.trim(); if(n){ motoristas.push(n); salvarTudo(); renderMotoristas(); document.getElementById("novoMotorista").value=""; } });
    document.getElementById("addGestorBtn").addEventListener("click",()=>{ let n=document.getElementById("novoGestor").value.trim(); if(n){ gestores.push(n); salvarTudo(); renderGestores(); document.getElementById("novoGestor").value=""; } });
    document.getElementById("addEncarregadoBtn").addEventListener("click",()=>{ let n=document.getElementById("novoEncarregado").value.trim(); if(n){ encarregados.push(n); salvarTudo(); renderEncarregados(); document.getElementById("novoEncarregado").value=""; } });
    document.getElementById("addPlacaBtn").addEventListener("click",()=>{ let tipo=document.getElementById("placaTipo").value.trim(); let num=document.getElementById("placaNumero").value.trim(); let mod=document.getElementById("placaModelo").value.trim(); if(tipo&&num){ placasBase.push({id:Date.now(), tipo, numero:num, modelo:mod}); salvarTudo(); renderPlacasBase(); document.getElementById("placaTipo").value=""; document.getElementById("placaNumero").value=""; document.getElementById("placaModelo").value=""; } else alert("Preencha tipo e número"); });
    document.getElementById("addStatusBtn").addEventListener("click",()=>{ let s=document.getElementById("novoStatus").value.trim(); if(s && !statusList.includes(s)){ statusList.push(s); salvarTudo(); renderStatusList(); document.getElementById("novoStatus").value=""; } else alert("Status inválido ou duplicado"); });
    document.getElementById("novaOrdemBtn").addEventListener("click", abrirModalNovaOrdem);
    document.getElementById("addPlacaToOrdemBtn").addEventListener("click", adicionarPlacaNaOrdem);
    document.getElementById("saveOrdemModalBtn").addEventListener("click", salvarOrdemModal);
    document.getElementById("closeModalBtn").addEventListener("click", fecharModal);
    // abas
    document.querySelectorAll(".tab-btn").forEach(btn=>{
        btn.addEventListener("click",()=>{
            document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active-pane"));
            document.getElementById(btn.dataset.tab).classList.add("active-pane");
            document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
        });
    });

    carregarTudo();
</script>
</body>
</html>
