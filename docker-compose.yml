services:
  app:
    build: .
    container_name: frota-manager-app
    ports:
      - "3000:3000"
    volumes:
      # Persistência de dados: Mapeia as pastas do seu PC para dentro do container
      - ./db:/app/db
      - ./uploads:/app/uploads
    environment:
      - PORT=3000
      - NODE_ENV=development
      - RENDER=false
    restart: always

# Removido volumes nomeados para usar apenas bind mounts (pastas locais)
