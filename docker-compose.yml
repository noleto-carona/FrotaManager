services:
  app:
    build: .
    container_name: frota-manager-app
    ports:
      - "3000:3000"
    volumes:
      # Persistência de dados e Sincronização em Tempo Real
      - ./db:/app/db
      - ./uploads:/app/uploads
      - ./public:/app/public
      - ./server:/app/server
    environment:
      - PORT=3000
      - NODE_ENV=development
      - RENDER=false
    restart: always

# Removido volumes nomeados para usar apenas bind mounts (pastas locais)
